# driftwatch example configuration
# Copy this file to /etc/driftwatch/driftwatch.yaml and adjust as needed.

# poll_interval controls how often watched paths are checked for changes.
poll_interval: 30s

# watch_targets is the list of files or directories to monitor.
watch_targets:
  - /etc/nginx/nginx.conf
  - /etc/ssh/sshd_config
  - /etc/cron.d

# log_level sets the minimum log level (debug, info, warn, error).
log_level: info

alerts:
  # Webhook alert — POST JSON payload to the given URL.
  webhook:
    enabled: false
    url: https://hooks.example.com/driftwatch

  # Slack alert — send a formatted message to a Slack incoming webhook.
  slack:
    enabled: false
    webhook_url: https://hooks.slack.com/services/XXX/YYY/ZZZ

  # PagerDuty alert — create an incident via Events API v2.
  pagerduty:
    enabled: false
    routing_key: your-pagerduty-routing-key

  # Email alert — send via SMTP.
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    username: alerts@example.com
    password: secret
    from: alerts@example.com
    to:
      - ops@example.com

# Circuit breaker — prevent alert storms when a downstream handler is unhealthy.
circuit_breaker:
  enabled: true
  # Number of consecutive failures before the circuit opens.
  threshold: 5
  # How long to wait before attempting a probe after the circuit opens.
  cooldown: 2m

# Rate limiting — cap the total number of alerts per window.
rate_limit:
  enabled: true
  max: 20
  window: 1m

# Deduplication — suppress repeated alerts for the same path within a TTL.
dedupe:
  enabled: true
  ttl: 5m

# Throttle — minimum gap between alerts for the same path.
throttle:
  enabled: false
  window: 30s

# Filter — only alert on paths matching these glob patterns.
# An empty list forwards all events.
filter:
  patterns: []

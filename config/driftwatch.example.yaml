# driftwatch example configuration
# Copy to driftwatch.yaml and adjust for your environment.

# How often to poll watched paths for changes.
poll_interval: 30s

# Logging verbosity: debug | info | warn | error
log_level: info

# Paths to monitor. At least one entry is required.
watch_targets:
  - path: /etc/nginx
    recurse: true
    ignore:
      - "*.swp"
      - "*.bak"
  - path: /etc/ssh/sshd_config
    recurse: false

alerts:
  # Always emit structured log lines (recommended to keep enabled).
  log: true

  # Generic JSON webhook (e.g. custom endpoint or Alertmanager).
  webhook:
    enabled: false
    url: https://hooks.example.com/driftwatch

  # Slack incoming webhook.
  slack:
    enabled: false
    webhook_url: https://hooks.slack.com/services/XXX/YYY/ZZZ

  # PagerDuty Events API v2.
  pagerduty:
    enabled: false
    routing_key: YOUR_PAGERDUTY_ROUTING_KEY

  # SMTP email alerts.
  email:
    enabled: false
    host: smtp.example.com
    port: 587
    username: alerts@example.com
    password: ""
    from: alerts@example.com
    to:
      - ops@example.com

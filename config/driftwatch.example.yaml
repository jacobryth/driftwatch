# driftwatch example configuration
# Copy to driftwatch.yaml and adjust for your environment.

# poll_interval controls how often watched paths are checked.
poll_interval: 30s

# log_level sets the minimum log level: debug, info, warn, error.
log_level: info

# watch defines the list of files or directories to monitor.
watch:
  - path: /etc/nginx
    recursive: true
  - path: /etc/ssh/sshd_config
    recursive: false
  - path: /etc/cron.d
    recursive: false

# alerts configures one or more notification channels.
alerts:
  # Log to stdout (always available).
  log:
    enabled: true

  # HTTP webhook — POST JSON payload to a URL.
  webhook:
    enabled: false
    url: "https://hooks.example.com/driftwatch"

  # Slack incoming webhook.
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    channel: "#ops-alerts"
    username: "driftwatch"

  # PagerDuty Events API v2.
  pagerduty:
    enabled: false
    routing_key: "your-pagerduty-routing-key"

  # Email via SMTP.
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    username: "alerts@example.com"
    password: "s3cr3t"
    from: "driftwatch@example.com"
    to:
      - "ops@example.com"

# pipeline configures middleware applied to every alert before delivery.
pipeline:
  # dedupe suppresses duplicate events for the same path within ttl.
  dedupe:
    enabled: true
    ttl: 5m

  # throttle allows at most max_events per path within window.
  throttle:
    enabled: true
    max_events: 5
    window: 1m

  # rate_limit caps total events across all paths within window.
  rate_limit:
    enabled: false
    max_events: 100
    window: 1m

  # retry retries failed handler deliveries.
  retry:
    enabled: true
    max_attempts: 3
    delay: 2s

  # filter restricts alerts to paths matching any of the given glob patterns.
  filter:
    enabled: false
    patterns:
      - "*.conf"
      - "*.yaml"

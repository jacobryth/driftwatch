# driftwatch example configuration
# Copy to /etc/driftwatch/driftwatch.yaml and adjust as needed.

# Directories or files to monitor for unexpected changes.
watch_targets:
  - /etc/nginx
  - /etc/app/config.yaml
  - /etc/ssl/certs

# How often to poll for changes (e.g. 10s, 1m).
poll_interval: 30s

# Minimum severity to trigger alerts: info | warning | critical
min_severity: warning

# Log alerts to stdout (always enabled).
log:
  enabled: true

# Send alerts to a generic webhook endpoint.
webhook:
  enabled: false
  url: https://example.com/hooks/driftwatch

# Send alerts to a Slack incoming webhook.
slack:
  enabled: false
  webhook_url: https://hooks.slack.com/services/XXX/YYY/ZZZ

# Send alerts to PagerDuty via Events API v2.
pagerduty:
  enabled: false
  integration_key: your-pagerduty-integration-key-here

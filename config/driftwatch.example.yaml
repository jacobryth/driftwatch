# driftwatch example configuration
# Copy to /etc/driftwatch/driftwatch.yaml and adjust as needed.

# poll_interval controls how often watched paths are checked for changes.
poll_interval: 30s

# snapshot_file is where driftwatch persists file state across restarts.
snapshot_file: /var/lib/driftwatch/snapshot.json

# log_level sets the minimum log level: debug, info, warn, error.
log_level: info

# watch_targets lists the files and directories to monitor.
watch_targets:
  - path: /etc/nginx/nginx.conf
    recursive: false
  - path: /etc/app
    recursive: true

# alert configures where drift events are sent.
alert:
  # log handler is always active; no extra config required.
  log: true

  # webhook sends a JSON POST for every event.
  webhook:
    enabled: false
    url: https://hooks.example.com/driftwatch

  # slack sends a formatted message to a Slack incoming webhook URL.
  slack:
    enabled: false
    url: https://hooks.slack.com/services/XXX/YYY/ZZZ

  # pagerduty creates an incident via the Events API v2.
  pagerduty:
    enabled: false
    routing_key: your-pagerduty-routing-key

  # email sends alert messages via SMTP.
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    username: driftwatch@example.com
    password: secret
    from: driftwatch@example.com
    to:
      - ops@example.com

  # rate_limit caps the number of alerts forwarded per window.
  rate_limit:
    enabled: true
    max: 10
    window: 1m

  # dedupe suppresses repeated alerts for the same file within the TTL.
  dedupe:
    enabled: true
    ttl: 5m

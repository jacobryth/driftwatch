# driftwatch example configuration

# How often to poll watched paths for changes.
poll_interval: 30s

# Log verbosity: debug | info | warn | error
log_level: info

# One or more targets to monitor.
watch_targets:
  - path: /etc/nginx
    glob: "*.conf"
    recursive: true
    exclude:
      - "/etc/nginx/cache"

  - path: /etc/app
    glob: "*.yaml"
    recursive: false

# Optional webhook alerting.
webhook:
  enabled: false
  endpoint: "https://hooks.example.com/driftwatch"
  # HTTP timeout for webhook POST requests.
  timeout: 10s

# DriftWatch example configuration
# Copy this file to driftwatch.yaml and adjust as needed.

# Directories and files to monitor for unexpected changes.
watch_targets:
  - /etc/myapp
  - /etc/nginx/nginx.conf

# How often to poll watched paths for changes (e.g. 30s, 1m, 5m).
poll_interval: 30s

# Logging alert handler — always enabled.
log:
  level: info        # debug | info | warn | error

# Webhook alert handler (optional).
# webhook:
#   url: https://hooks.example.com/driftwatch
#   timeout: 10s

# Slack incoming webhook alert handler (optional).
# slack:
#   webhook_url: https://hooks.slack.com/services/T000/B000/xxxx
